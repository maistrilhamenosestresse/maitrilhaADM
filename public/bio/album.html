<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Álbum VIP - Mais Trilha Menos Estresse</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="ai_gallery_data.js"></script>

    <style>
        :root {
            --primary: #FF8A00;
            --secondary: #E52E71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overscroll-behavior: none;
        }

        /* Nav */
        nav {
            padding: 1rem;
            display: flex;
            align-items: center;
            background: #000;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .back-btn { color: #fff; text-decoration: none; font-size: 1.2rem; margin-right: 1rem; }
        .brand h1 { font-family: 'Outfit'; font-size: 1.1rem; }

        /* Tabs */
        .category-tabs {
            display: flex;
            gap: 10px;
            padding: 15px;
            overflow-x: auto;
            scrollbar-width: none;
            background: #111;
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        .cat-btn {
            background: #222;
            color: #ccc;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-family: 'Outfit';
            font-size: 0.9rem;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.3s;
        }
        .cat-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            font-weight: 600;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
        }
        @media(min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 4px; }
        }
        .grid-item {
            position: relative;
            aspect-ratio: 1/1;
            overflow: hidden;
            background: #222;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .grid-item:active { transform: scale(0.97); }
        .grid-item img, .grid-item video {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .play-icon {
            position: absolute; top: 8px; right: 8px;
            color: white; font-size: 1.1rem;
            text-shadow: 0 0 6px rgba(0,0,0,0.9);
        }

        /* ==========================================
           LIGHTBOX - Completamente reescrito e limpo
           ========================================== */
        #lightbox {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
            overscroll-behavior: none;
        }
        #lightbox.open { display: flex; }

        /* Barra superior do lightbox */
        .lb-topbar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            z-index: 10;
        }
        .lb-close {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            width: 44px; height: 44px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            transition: background 0.2s;
        }
        .lb-close:active { background: rgba(255,255,255,0.3); }
        .lb-counter {
            font-family: 'Outfit';
            font-size: 0.95rem;
            color: #fff;
            background: rgba(0,0,0,0.4);
            padding: 6px 14px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
        }
        .lb-trail {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
        }

        /* Área de imagem/vídeo com carrossel manual */
        .lb-viewport {
            position: absolute;
            inset: 0;
            overflow: hidden;
            touch-action: pan-y;
        }
        .lb-track {
            display: flex;
            height: 100%;
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }
        .lb-track.no-transition { transition: none; }
        .lb-slide {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        .lb-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }
        .lb-slide video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Botões de navegação - FORA do viewport, posição absoluta garantida */
        .lb-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 48px; height: 48px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .lb-btn:active { background: rgba(255,255,255,0.25); transform: translateY(-50%) scale(0.9); }
        .lb-btn.prev { left: 12px; }
        .lb-btn.next { right: 12px; }
        .lb-btn:disabled { opacity: 0.2; cursor: default; }

        /* Barra inferior */
        .lb-bottombar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .lb-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .lb-dot.active {
            background: #fff;
            width: 18px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <div class="brand"><h1>Experiências Mais Trilha</h1></div>
    </nav>

    <div class="category-tabs" id="tabs">
        <button class="cat-btn active" data-filter="all">Tudo</button>
        <button class="cat-btn" data-filter="videos">▶️ Vídeos</button>
    </div>

    <main class="grid" id="grid"></main>

    <!-- LIGHTBOX LIMPO - Sem Swiper, sem conflitos -->
    <div id="lightbox">
        <!-- Viewport com track deslizável -->
        <div class="lb-viewport" id="lbViewport">
            <div class="lb-track" id="lbTrack"></div>
        </div>

        <!-- Barra superior: Fechar + Contador -->
        <div class="lb-topbar">
            <button class="lb-close" id="lbClose"><i class="fas fa-times"></i></button>
            <span class="lb-counter" id="lbCounter">1 / 1</span>
            <span class="lb-trail" id="lbTrail">📍</span>
        </div>

        <!-- Botões de navegar (FORA do viewport) -->
        <button class="lb-btn prev" id="lbPrev"><i class="fas fa-chevron-left"></i></button>
        <button class="lb-btn next" id="lbNext"><i class="fas fa-chevron-right"></i></button>

        <!-- Barra inferior: Dots de paginação -->
        <div class="lb-bottombar" id="lbDots"></div>
    </div>

    <script>
        // ---- Dados ----
        let currentMediaList = [];
        let dataSource = typeof galleryData !== 'undefined' 
            ? galleryData 
            : { allPhotos: [], videos: [], categories: { people: [], landscape: [] } };

        // ---- Lightbox State ----
        let currentIndex = 0;
        const MAX_DOTS = 20; // Máximo de dots visíveis

        const lightbox  = document.getElementById('lightbox');
        const lbTrack   = document.getElementById('lbTrack');
        const lbClose   = document.getElementById('lbClose');
        const lbPrev    = document.getElementById('lbPrev');
        const lbNext    = document.getElementById('lbNext');
        const lbCounter = document.getElementById('lbCounter');
        const lbTrail   = document.getElementById('lbTrail');
        const lbDots    = document.getElementById('lbDots');
        const lbViewport = document.getElementById('lbViewport');

        // ---- Grid ----
        function loadGrid(filter) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            currentMediaList = [];

            if (filter === 'all') {
                currentMediaList = [...dataSource.allPhotos, ...dataSource.videos];
            } else if (filter === 'videos') {
                currentMediaList = [...dataSource.videos];
            }

            currentMediaList.sort((a, b) => a.name.localeCompare(b.name));

            currentMediaList.forEach((media, index) => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                const isVideo = /\.(mp4|mov|avi|mkv|webm)$/i.test(media.path);
                item.innerHTML = isVideo
                    ? `<video src="${media.path}" muted loop playsinline></video><i class="fas fa-play play-icon"></i>`
                    : `<img src="${media.path}" loading="lazy">`;
                item.addEventListener('click', () => openLightbox(index));
                grid.appendChild(item);
            });
        }

        // ---- Lightbox: Abrir ----
        function openLightbox(startIndex) {
            currentIndex = startIndex;

            // Construir slides
            lbTrack.innerHTML = '';
            lbDots.innerHTML = '';

            currentMediaList.forEach((media, i) => {
                const slide = document.createElement('div');
                slide.className = 'lb-slide';
                const isVideo = /\.(mp4|mov|avi|mkv|webm)$/i.test(media.path);
                slide.innerHTML = isVideo
                    ? `<video src="${media.path}" controls playsinline preload="metadata"></video>`
                    : `<img src="${media.path}" loading="lazy">`;
                lbTrack.appendChild(slide);

                // Dots (apenas se não tiver muitos)
                if (currentMediaList.length <= MAX_DOTS) {
                    const dot = document.createElement('div');
                    dot.className = 'lb-dot' + (i === startIndex ? ' active' : '');
                    dot.addEventListener('click', () => goTo(i));
                    lbDots.appendChild(dot);
                }
            });

            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
            goTo(startIndex, false); // Posiciona sem animação
        }

        // ---- Lightbox: Navegar ----
        function goTo(index, animate = true) {
            const total = currentMediaList.length;
            if (index < 0 || index >= total) return;

            // Pausa todos os vídeos
            lbTrack.querySelectorAll('video').forEach(v => v.pause());

            currentIndex = index;

            if (!animate) lbTrack.classList.add('no-transition');
            lbTrack.style.transform = `translateX(-${index * 100}%)`;
            if (!animate) {
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => lbTrack.classList.remove('no-transition'));
                });
            }

            // Play do vídeo atual se for vídeo
            const activeSlide = lbTrack.children[index];
            if (activeSlide) {
                const vid = activeSlide.querySelector('video');
                if (vid) vid.play().catch(() => {});
            }

            // Atualiza UI
            lbCounter.textContent = `${index + 1} / ${total}`;
            const media = currentMediaList[index];
            if (media?.trail) lbTrail.textContent = `📍 ${media.trail.split('-')[0].trim()}`;

            lbPrev.disabled = index === 0;
            lbNext.disabled = index === total - 1;

            // Atualiza dots
            document.querySelectorAll('.lb-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        // ---- Lightbox: Fechar ----
        function closeLightbox() {
            lbTrack.querySelectorAll('video').forEach(v => v.pause());
            lightbox.classList.remove('open');
            document.body.style.overflow = '';
        }

        // ---- Event Listeners ----
        lbClose.addEventListener('click', closeLightbox);
        lbPrev.addEventListener('click', () => goTo(currentIndex - 1));
        lbNext.addEventListener('click', () => goTo(currentIndex + 1));

        // Fechar clicando no fundo (não na imagem/botões)
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        // Teclado (Desktop)
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('open')) return;
            if (e.key === 'ArrowRight') goTo(currentIndex + 1);
            if (e.key === 'ArrowLeft')  goTo(currentIndex - 1);
            if (e.key === 'Escape')     closeLightbox();
        });

        // ---- Touch Swipe (Mobile) ----
        let touchStartX = 0;
        let touchStartY = 0;
        let isDragging = false;

        lbViewport.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            isDragging = false;
        }, { passive: true });

        lbViewport.addEventListener('touchmove', (e) => {
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            // Se mais horizontal que vertical, marca como drag
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
                isDragging = true;
                // Feedback visual de arraste
                const offset = currentIndex * 100;
                const drag = (dx / window.innerWidth) * 100;
                lbTrack.classList.add('no-transition');
                lbTrack.style.transform = `translateX(calc(-${offset}% + ${dx}px))`;
            }
        }, { passive: true });

        lbViewport.addEventListener('touchend', (e) => {
            lbTrack.classList.remove('no-transition');
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (isDragging) {
                if (dx < -50) goTo(currentIndex + 1);
                else if (dx > 50) goTo(currentIndex - 1);
                else goTo(currentIndex); // volta para a posição
            }
            isDragging = false;
        }, { passive: true });

        // ---- Tabs ----
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadGrid(btn.dataset.filter);
            });
        });

        // ---- Init ----
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof galleryData !== 'undefined') {
                dataSource = galleryData;
                loadGrid('all');
            } else {
                const interval = setInterval(() => {
                    if (typeof galleryData !== 'undefined') {
                        clearInterval(interval);
                        dataSource = galleryData;
                        loadGrid('all');
                    }
                }, 200);
            }
        });
    </script>
</body>
</html>
